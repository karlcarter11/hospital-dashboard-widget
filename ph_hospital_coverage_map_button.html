<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH Hospital Coverage Map</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f0;
  --surf:#ffffff;
  --surf2:#f5f8f5;
  --bdr:#d8e8d8;
  --bdr2:#c5d8c5;
  --txt:#1a2e1a;
  --sub:#4a6e4a;
  --mut:#8aaa8a;
  --acc:#2e7d32;
  --acc2:#43a047;
  --acc-light:#e8f5e9;
  --grn:#2e7d32;
  --grn2:#66bb6a;
  --red:#c62828;
  --ylw:#e65100;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
header{
  background:var(--surf);
  border-bottom:2px solid var(--bdr);
  flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto;}
.bmark{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:var(--acc);
  display:flex;align-items:center;justify-content:center;
}
.bmark svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.bname{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--txt);}
.bpipe{width:1px;height:16px;background:var(--bdr2);margin:0 14px;}
.bsub{font-size:10px;color:var(--sub);letter-spacing:.02em;}
.fb-dot{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;margin-left:12px;color:var(--mut);
}
.fb-dot::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--mut);
  transition:background .3s;
}
.fb-dot.live::before{background:var(--grn);animation:pulse 2s infinite;}
.fb-dot.live{color:var(--grn);}
.fb-dot.error::before{background:var(--red);}
.fb-dot.error{color:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

.hstats{display:flex;align-items:center;gap:8px;}
.hstat{
  display:flex;align-items:center;gap:6px;
  background:var(--acc-light);border:1px solid var(--bdr);
  border-radius:8px;padding:5px 12px;
}
.hstat-v{font-size:14px;font-weight:700;color:var(--acc);line-height:1;}
.hstat-l{font-size:9px;color:var(--sub);letter-spacing:.04em;text-transform:uppercase;}
.hd{width:1px;height:20px;background:var(--bdr2);margin:0 2px;}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sb{
  width:252px;background:var(--surf);
  border-right:2px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.sbh{padding:12px;border-bottom:1px solid var(--bdr);}
.sb-filters{display:flex;gap:6px;}
.srch{position:relative;flex:1;}
.srch input{
  width:100%;background:var(--surf2);
  border:1px solid var(--bdr);border-radius:7px;
  padding:7px 8px 7px 28px;
  color:var(--txt);font-family:'Inter',sans-serif;font-size:11px;
  outline:none;transition:border-color .15s;
}
.srch input:focus{border-color:var(--acc);}
.srch input::placeholder{color:var(--mut);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-52%);color:var(--mut);font-size:12px;pointer-events:none;}
.rfsel{
  background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;
  padding:0 8px;color:var(--txt);font-family:'Inter',sans-serif;
  font-size:10px;outline:none;cursor:pointer;
}
.rfsel option{background:var(--surf);}

/* Province list */
.pl{flex:1;overflow-y:auto;padding:4px;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
.pi{
  display:flex;align-items:center;gap:8px;
  padding:7px 8px;border-radius:7px;cursor:pointer;
  transition:background .1s;
}
.pi:hover{background:var(--acc-light);}
.pi.active{background:var(--acc-light);outline:1.5px solid var(--acc);}
.pd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pii{flex:1;min-width:0;}
.pn{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);line-height:1.3;}
.ps{font-size:9px;color:var(--sub);}
.pp{font-size:11px;font-weight:600;flex-shrink:0;min-width:32px;text-align:right;color:var(--acc);}

/* Legend */
.leg{padding:10px 12px 12px;border-top:2px solid var(--bdr);}
.leg-row{display:flex;align-items:center;gap:8px;}
.lb{flex:1;height:5px;border-radius:3px;background:linear-gradient(to right,var(--red),var(--ylw),var(--grn));}
.ll{display:flex;justify-content:space-between;font-size:8px;color:var(--sub);margin-top:4px;}
.lnd{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:9px;color:var(--mut);}
.lndd{width:7px;height:7px;background:var(--bg);border:1.5px solid var(--bdr2);border-radius:50%;}

/* MAP */
.mw{flex:1;background:var(--bg);position:relative;overflow:hidden;}
.mw::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:
    linear-gradient(to right,var(--bg) 0%,transparent 28px),
    linear-gradient(to left, var(--bg) 0%,transparent 28px),
    linear-gradient(to bottom,var(--bg) 0%,transparent 28px),
    linear-gradient(to top,  var(--bg) 0%,transparent 28px);
}
#mapsvg{position:absolute;inset:0;width:100%;height:100%;touch-action:none;overflow:visible;}

/* Provinces */
.province{fill:#e8f0e8;stroke:#c5d8c5;stroke-width:3;cursor:pointer;transition:fill .3s;}
.province:hover{fill:#d0e8d0;stroke:var(--acc);stroke-width:5;}
.province.sel{fill:#c5e0c5;stroke:var(--acc);stroke-width:5;}
.plabel{font-family:'Inter',sans-serif;font-size:90px;fill:rgba(74,110,74,0.6);text-anchor:middle;dominant-baseline:middle;pointer-events:none;user-select:none;}

/* TOOLTIP */
.tip{
  position:absolute;background:var(--surf);
  border:1.5px solid var(--bdr2);border-radius:14px;
  width:240px;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.08);
  display:none;pointer-events:all;overflow:hidden;
}
.tip-head{padding:14px 14px 10px;border-bottom:1px solid var(--bdr);}
.tc{
  position:absolute;top:10px;right:10px;
  width:22px;height:22px;background:var(--surf2);
  border:none;border-radius:50%;color:var(--sub);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
  transition:background .15s;
}
.tc:hover{background:var(--bdr);}
.treg{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:2px;}
.tname{font-size:15px;font-weight:700;color:var(--txt);line-height:1.2;padding-right:24px;}
.tip-body{padding:12px 14px 14px;}
.tip-pct-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.tip-pct{font-size:32px;font-weight:700;line-height:1;color:var(--acc);}
.tip-frac{font-size:12px;color:var(--sub);}
.tip-bar{height:5px;background:var(--acc-light);border-radius:3px;margin-bottom:12px;overflow:hidden;}
.tip-fill{height:100%;border-radius:3px;background:var(--acc);transition:width .4s;}
.tip-link{
  display:block;text-align:center;padding:9px;border-radius:8px;
  background:var(--acc);color:#fff;text-decoration:none;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  transition:background .15s;
}
.tip-link:hover{background:var(--acc2);}

/* TOAST */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--txt);border-radius:20px;padding:8px 18px;
  font-size:11px;color:#fff;
  z-index:9999;transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

// ── COLOR ─────────────────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function r2h(r,g,b){return'#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');}
function cc(p){
  if(p==null) return null;
  const R=h2r('#c62828'),Y=h2r('#f57f17'),G=h2r('#2e7d32');
  const rgb=p<=50?R.map((v,i)=>lerp(v,Y[i],p/50)):Y.map((v,i)=>lerp(v,G[i],(p-50)/50));
  return r2h(...rgb);
}
function getCov(name){
  const total=PROV_TOTALS[name]||0;
  const visited=regVisited[name]||0;
  if(!total||!visited) return null;
  return Math.min(100,(visited/total)*100);
}

// ── MAP SETUP ─────────────────────────────────────────────────────────────────
const mw=document.getElementById('mw');
const svg=document.getElementById('mapsvg');
// SVG viewBox handles all scaling — no JS transform needed
window.addEventListener('resize', ()=>{}); // no-op

// ── PROVINCE CLICK ────────────────────────────────────────────────────────────
let selName=null;
document.querySelectorAll('.province').forEach(el=>{
  el.addEventListener('click',e=>{
    e.stopPropagation();
    openTip(el.dataset.name,el.dataset.reg,el,e);
  });
});
svg.addEventListener('click',()=>closeTip());

function openTip(name,reg,el,evt){
  selName=name;
  document.querySelectorAll('.province.sel').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  hlSidebar(name);
  const pct=getCov(name);
  const v=regVisited[name]||0, t=PROV_TOTALS[name]||0;
  document.getElementById('t-reg').textContent=reg;
  document.getElementById('t-name').textContent=name;
  document.getElementById('t-pct').textContent=pct!=null?Math.round(pct)+'%':'—';
  document.getElementById('t-pct').style.color=pct!=null?(cc(pct)||'var(--acc)'):'var(--mut)';
  document.getElementById('t-frac').textContent=v>0?`${v} of ${t} visited`:'No visits logged yet';
  document.getElementById('t-fill').style.width=(pct||0)+'%';
  document.getElementById('t-fill').style.background=cc(pct)||'var(--acc)';
  const tip=document.getElementById('tip');
  tip.style.display='block';
  const r=mw.getBoundingClientRect();
  let l=evt.clientX-r.left+14, top=evt.clientY-r.top-20;
  if(l+250>r.width) l=evt.clientX-r.left-258;
  if(top+220>r.height) top=r.height-228;
  if(top<8) top=8;
  tip.style.left=l+'px';tip.style.top=top+'px';
}

window.closeTip=function(){
  document.getElementById('tip').style.display='none';
  document.querySelectorAll('.province.sel').forEach(p=>p.classList.remove('sel'));
  selName=null;
  document.querySelectorAll('.pi.active').forEach(p=>p.classList.remove('active'));
};

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar(filter='',regF=''){
  const list=document.getElementById('plist');
  let items=[...PROVINCES]
    .filter(p=>(!filter||p.name.toLowerCase().includes(filter.toLowerCase()))&&(!regF||p.reg===regF))
    .map(p=>Object.assign({},p,{pct:getCov(p.name)}))
    .sort((a,b)=>a.pct!=null&&b.pct!=null?b.pct-a.pct:a.pct!=null?-1:b.pct!=null?1:a.name.localeCompare(b.name));
  if(!items.length){list.innerHTML='<div style="padding:16px;text-align:center;color:var(--mut);font-size:11px">No results</div>';return;}
  list.innerHTML=items.map(i=>{
    const c=i.pct!=null?(cc(i.pct)||'var(--mut)'):'var(--mut)';
    const v=regVisited[i.name]||0, t=PROV_TOTALS[i.name]||0;
    const sub=v>0?`${v} / ${t} visited`:'not yet visited';
    return `<div class="pi${selName===i.name?' active':''}" data-name="${i.name}" onclick="focusProv('${i.name.replace(/'/g,"\\'")}')">
      <div class="pd" style="background:${c}"></div>
      <div class="pii"><div class="pn">${i.name}</div><div class="ps">${sub}</div></div>
      <div class="pp">${i.pct!=null?i.pct.toFixed(0)+'%':'—'}</div>
    </div>`;
  }).join('');
}

function hlSidebar(name){
  document.querySelectorAll('.pi').forEach(el=>el.classList.toggle('active',el.dataset.name===name));
  const el=document.querySelector(`.pi[data-name="${name}"]`);
  if(el) el.scrollIntoView({block:'nearest'});
}

window.focusProv=function(name){
  selName=name;
  const el=document.querySelector(`path[data-name="${name}"]`);
  if(el){
    try{
      const bb=el.getBBox();
      const r=mw.getBoundingClientRect();
      openTip(name,el.dataset.reg,el,{clientX:r.left+r.width/2,clientY:r.top+r.height/2});
    }catch(e){}
  }
  hlSidebar(name);
};

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats(){
  const v=Object.values(regVisited).reduce((s,n)=>s+n,0);
  const t=1879;
  document.getElementById('s-v').textContent=v;
  document.getElementById('s-t').textContent=t;
  const pct=v>0?((v/t)*100).toFixed(1)+'%':'0%';
  document.getElementById('s-p').textContent=pct;
}

// ── COLORS ────────────────────────────────────────────────────────────────────
function refreshColors(){
  document.querySelectorAll('.province').forEach(el=>{
    const pct=getCov(el.dataset.name);
    el.style.fill=pct!=null?(cc(pct)||'#c8dcc8'):'#e8f0e8';
  });
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let tTmr;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tTmr);tTmr=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── FIREBASE POLLING ─────────────────────────────────────────────────────────
const FB_URL='https://hospital-audit-gasion-default-rtdb.asia-southeast1.firebasedatabase.app';
const VISITED_STATUSES=new Set(['Visited - Lead','Client - Active','Closed - Lost']);
let regVisited={};
let lastHash='';

function setStatus(state){
  const el=document.getElementById('fb-status');
  el.className='fb-dot '+state;
  el.textContent={loading:'Connecting',live:'Live',error:'Offline'}[state]||state;
}

function computeRegionCoverage(auditData){
  regVisited={};
  if(!auditData) return;
  Object.entries(auditData).forEach(([id,rec])=>{
    const idx=parseInt(id);
    if(!idx||isNaN(idx)) return;
    const prov=ID_PROVINCE[idx-1];
    if(!prov) return;
    if(VISITED_STATUSES.has(rec.status)) regVisited[prov]=(regVisited[prov]||0)+1;
  });
  refreshColors();
  buildSidebar(document.getElementById('srch').value, document.getElementById('rfsel').value);
  updateStats();
  if(selName){
    const pct=getCov(selName);
    const v=regVisited[selName]||0, t=PROV_TOTALS[selName]||0;
    document.getElementById('t-pct').textContent=pct!=null?Math.round(pct)+'%':'—';
    document.getElementById('t-pct').style.color=pct!=null?(cc(pct)||'var(--acc)'):'var(--mut)';
    document.getElementById('t-frac').textContent=v>0?`${v} of ${t} visited`:'No visits logged yet';
    document.getElementById('t-fill').style.width=(pct||0)+'%';
    document.getElementById('t-fill').style.background=cc(pct)||'var(--acc)';
  }
}

async function poll(){
  try{
    const res=await fetch(`${FB_URL}/audit_data.json?t=${Date.now()}`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    if(text!==lastHash){
      lastHash=text;
      const data=JSON.parse(text);
      // Debug: show what IDs are in Firebase and their status
      const debug=[];
      if(data) Object.entries(data).forEach(([id,rec])=>{
        const idx=parseInt(id);
        const prov=(!isNaN(idx)&&idx>0)?ID_PROVINCE[idx-1]:'?';
        debug.push(`ID ${id} → ${prov||'unmapped'} → "${rec.status}"`);
      });
      console.log('Firebase records:\n'+debug.join('\n'));
      computeRegionCoverage(data);
    }
    setStatus('live');
  }catch(e){
    setStatus('error');
    console.error('Poll error:',e);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar();
setStatus('loading');
poll();
setInterval(poll, 5000);
